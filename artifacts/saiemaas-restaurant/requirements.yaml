packages:
  "framer-motion": "For premium page transitions, scroll-triggered animations, and the WhatsApp FAB pulse"
  "@hookform/resolvers": "Zod validation resolver for the react-hook-form booking system"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"
  "react-hook-form": "Form handling for the table booking section"
  "zod": "Schema validation for forms"

images:
  - path: "artifacts/saiemaas-restaurant/public/images/hero-bg.png"
    description: "Cinematic warm luxury restaurant interior, low lighting, elegant tables, gold accents, 4k"
    aspect_ratio: "16:9"
  - path: "artifacts/saiemaas-restaurant/public/images/chicken-lollipop.png"
    description: "Gourmet food photography of crispy red chicken lollipop with spicy sauce on a dark slate plate"
    aspect_ratio: "1:1"
  - path: "artifacts/saiemaas-restaurant/public/images/chicken-tandoori.png"
    description: "Gourmet food photography of smoky red chicken tandoori with lemon and onion garnish"
    aspect_ratio: "1:1"
  - path: "artifacts/saiemaas-restaurant/public/images/chicken-maratha.png"
    description: "Gourmet food photography of rich Indian chicken maratha curry in a copper bowl"
    aspect_ratio: "1:1"
  - path: "artifacts/saiemaas-restaurant/public/images/paneer-curry.png"
    description: "Gourmet food photography of rich creamy paneer tikka masala in a rustic bowl"
    aspect_ratio: "1:1"
  - path: "artifacts/saiemaas-restaurant/public/images/mojito.png"
    description: "Gourmet photography of a refreshing green mint mojito with lime and ice in a tall glass, dark background"
    aspect_ratio: "3:4"
  - path: "artifacts/saiemaas-restaurant/public/images/cocktails.png"
    description: "Gourmet photography of a luxurious glowing orange cocktail in a martini glass, bar background"
