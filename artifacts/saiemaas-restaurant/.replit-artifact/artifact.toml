kind = "web"
previewPath = "/"
title = "Saiemaa's Family Dining And Bar"
version = "1.0.0"
id = "artifacts/saiemaas-restaurant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19667

[services.development]
run = "pnpm --filter @workspace/saiemaas-restaurant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saiemaas-restaurant", "run", "build" ]
publicDir = "artifacts/saiemaas-restaurant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19667"
BASE_PATH = "/"
